<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>גישה נדחתה — Birthday Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<div style="max-width:420px; width:100%; padding:0 16px;">
  <div class="card shadow text-center">
    <div class="card-header bg-danger text-white py-4">
      <i class="bi bi-shield-x" style="font-size:3rem"></i>
      <h4 class="mb-0 mt-2">גישה נדחתה</h4>
    </div>
    <div class="card-body p-4">
      <p class="text-muted">
        החשבון <strong>{{ email }}</strong> אינו מורשה לגשת לאתר זה.
      </p>
      <p class="text-muted small">
        פנה למנהל המערכת כדי לבקש גישה.
      </p>
      <a href="/logout" class="btn btn-outline-secondary mt-2">
        <i class="bi bi-box-arrow-right"></i> התנתקות
      </a>
    </div>
  </div>
</div>
</body>
</html>
