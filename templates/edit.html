<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit — Birthday Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    option.variable-day { color: #6c757d; font-style: italic; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-cake2"></i> Hebrew Birthday Bot</a>
  </div>
</nav>

<div class="container" style="max-width:500px">
  <div class="card shadow-sm">
    <div class="card-header bg-secondary text-white">
      <i class="bi bi-pencil-square"></i> Edit — {{ person.name }}
    </div>
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name"
                 value="{{ person.name }}" required>
        </div>

        <!-- Month first — day options depend on selected month -->
        <div class="mb-2">
          <label class="form-label">Hebrew Month</label>
          <select class="form-select" name="hebrew_month" id="editMonth"
                  onchange="buildDayOptions('editMonth','editDay')" required>
            {% for num, name in hebrew_months.items() %}
              <option value="{{ num }}"
                {% if num == person.hebrew_month %}selected{% endif %}>
                {{ name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Day</label>
          <select class="form-select" name="hebrew_day" id="editDay" required>
            <!-- Populated by JS on page load -->
          </select>
          <div id="editDayNote" class="form-text text-warning d-none">
            <i class="bi bi-exclamation-triangle-fill"></i>
            Days marked <em>*</em> exist only in some year types.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Notes</label>
          <input type="text" class="form-control" name="notes"
                 value="{{ person.notes or '' }}">
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1">
            <i class="bi bi-save"></i> Save
          </button>
          <a href="/" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const MONTH_DAYS = {{ month_days_info | tojson }};

function buildDayOptions(monthSelectId, daySelectId, preselect) {
  const monthEl = document.getElementById(monthSelectId);
  const dayEl   = document.getElementById(daySelectId);
  const noteEl  = document.getElementById(daySelectId + 'Note');
  const month   = parseInt(monthEl.value);

  dayEl.innerHTML = '';

  if (!month || !MONTH_DAYS[month]) {
    dayEl.disabled = true;
    dayEl.innerHTML = '<option value="">— select month first —</option>';
    if (noteEl) noteEl.classList.add('d-none');
    return;
  }

  const info = MONTH_DAYS[month];
  dayEl.disabled = false;

  let hasVariable = false;
  for (let d = 1; d <= info.max; d++) {
    const opt = document.createElement('option');
    opt.value = d;
    const isLastAndVariable = info.variable && d === info.max;
    if (isLastAndVariable) {
      opt.textContent = d + ' *';
      opt.className = 'variable-day';
      hasVariable = true;
    } else {
      opt.textContent = d;
    }
    if (preselect && d === preselect) opt.selected = true;
    dayEl.appendChild(opt);
  }

  if (noteEl) noteEl.classList.toggle('d-none', !hasVariable);
}

// Pre-populate the day select for the existing record
buildDayOptions('editMonth', 'editDay', {{ person.hebrew_day }});
</script>
</body>
</html>
