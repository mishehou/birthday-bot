<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit — Birthday Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>body { background: #f8f9fa; }</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-cake2"></i> Hebrew Birthday Bot</a>
  </div>
</nav>

<div class="container" style="max-width:500px">
  <div class="card shadow-sm">
    <div class="card-header bg-secondary text-white">
      <i class="bi bi-pencil-square"></i> Edit — {{ person.name }}
    </div>
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" name="name"
                 value="{{ person.name }}" required>
        </div>

        <!-- Year → Month → Day -->
        <div class="mb-2">
          <label class="form-label">Hebrew Year</label>
          <select class="form-select" name="hebrew_year_ui" id="editYear"
                  onchange="onYearChange()">
            {% for y in range(5700, 5801) %}
              <option value="{{ y }}" {% if y == current_hebrew_year %}selected{% endif %}>{{ y }}</option>
            {% endfor %}
          </select>
          <div class="form-text text-muted">Used to determine exact day count — not stored.</div>
        </div>

        <div class="mb-2">
          <label class="form-label">Hebrew Month</label>
          <select class="form-select" name="hebrew_month" id="editMonth"
                  onchange="buildDayOptions()" required>
            <option value="">— loading… —</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Day</label>
          <select class="form-select" name="hebrew_day" id="editDay" required>
            <option value="">— select month first —</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Notes</label>
          <input type="text" class="form-control" name="notes"
                 value="{{ person.notes or '' }}">
        </div>

        <div class="mb-3">
          <label class="form-label">Gender</label>
          <select class="form-select" name="gender">
            <option value="" {% if not person.gender %}selected{% endif %}>— not specified —</option>
            <option value="M" {% if person.gender == 'M' %}selected{% endif %}>M — Male</option>
            <option value="F" {% if person.gender == 'F' %}selected{% endif %}>F — Female</option>
          </select>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1">
            <i class="bi bi-save"></i> Save
          </button>
          <a href="/" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let editYearData = null;
const PRESELECT_MONTH = {{ person.hebrew_month }};
const PRESELECT_DAY   = {{ person.hebrew_day }};

async function onYearChange(preselectMonth, preselectDay) {
  const year    = parseInt(document.getElementById('editYear').value);
  const monthEl = document.getElementById('editMonth');
  const dayEl   = document.getElementById('editDay');

  monthEl.innerHTML = '<option value="">— loading… —</option>';
  dayEl.innerHTML   = '<option value="">— select month first —</option>';
  dayEl.disabled    = true;
  editYearData = null;

  if (!year) return;

  try {
    const res  = await fetch(`/api/year-info/${year}`);
    const data = await res.json();
    editYearData = data;

    monthEl.innerHTML = '';
    for (const m of data.months) {
      const opt = document.createElement('option');
      opt.value = m.num;
      opt.textContent = m.name;
      if (m.num === (preselectMonth ?? 0)) opt.selected = true;
      monthEl.appendChild(opt);
    }

    buildDayOptions(preselectDay);
  } catch(e) {
    console.error('Failed to fetch year info:', e);
  }
}

function buildDayOptions(preselect) {
  const monthEl = document.getElementById('editMonth');
  const dayEl   = document.getElementById('editDay');
  const month   = parseInt(monthEl.value);

  dayEl.innerHTML = '';

  if (!month || !editYearData) {
    dayEl.disabled = true;
    dayEl.innerHTML = '<option value="">— select month first —</option>';
    return;
  }

  const monthInfo = editYearData.months.find(m => m.num === month);
  if (!monthInfo) { dayEl.disabled = true; return; }

  dayEl.disabled = false;
  for (let d = 1; d <= monthInfo.days; d++) {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    if (d === (preselect ?? 0)) opt.selected = true;
    dayEl.appendChild(opt);
  }
}

// Load months and pre-select existing values on page load
window.addEventListener('DOMContentLoaded', () => {
  onYearChange(PRESELECT_MONTH, PRESELECT_DAY);
});
</script>
</body>
</html>
